<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa Cemitério - ADMIN</title>
    <link rel="icon" type="icon" href="logoRodape.png" />
    <link rel="stylesheet" href="/login/loginStyles.css" />
    <!--Reconsiderar sua presenca no frontend, visto aos dados sensiveis (mesmo com a separacao de front e back)-->
  </head>
  <body>
    <form id="divLogin">
      <div id="divLoginWrapper">
        <img src="logoRodape.png" />
        <h1>REALIZAR LOGIN</h1>

        <div id="loginInputs">
          <input
            id="username"
            type="text"
            placeholder="Digite seu usuário..."
          />

          <input
            id="password"
            type="password"
            placeholder="Digite sua senha..."
          />
        </div>

        <button type="submit">Enviar</button>
      </div>
      <a href="../index.html" id="botaoVoltar">Voltar à página principal</a>
    </form>

    <div class="resultadoLogin">
      <!-- Terminar depois e modificar conforme resultado do login-->
      <div class="resultadoLoginWrapper">
        <h2></h2>
      </div>
    </div>

    <script src="/login/loginUX.js" defer></script>
  </body>
</html>
